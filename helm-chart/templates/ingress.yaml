apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: foodrunner-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  rules:
  - host: foodrunner.local
    http:
      paths:
      - path: /(place-order|orders.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: order
            port:
              number: 5001
      - path: /(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: restaurant
            port:
              number: 5000
